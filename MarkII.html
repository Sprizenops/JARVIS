<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARK HUD v3.0</title>
    <style>
        :root {
            --glow-color: #00d4ff;
            --bg-dark: #050505;
            --panel-bg: rgba(0, 212, 255, 0.05);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--glow-color);
            font-family: 'Segoe UI', Orbitron, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Scanline Effect */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        .header {
            width: 90%;
            padding: 20px;
            border-bottom: 1px solid var(--glow-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0px 10px 20px -10px var(--glow-color);
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            width: 90%;
            margin-top: 30px;
            height: 70vh;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--glow-color);
            padding: 20px;
            position: relative;
            backdrop-filter: blur(5px);
        }

        .panel h2 {
            font-size: 0.9rem;
            margin-top: 0;
            border-left: 4px solid var(--glow-color);
            padding-left: 10px;
        }

        /* Goal List Styling */
        #goal-list {
            list-style: none;
            padding: 0;
        }
        .goal-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.8rem;
        }
        input[type="checkbox"] {
            accent-color: var(--glow-color);
            margin-right: 10px;
        }

        /* Input Area */
        .input-group {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            background: transparent;
            border: 1px solid var(--glow-color);
            color: var(--glow-color);
            padding: 10px;
            flex-grow: 1;
            outline: none;
        }

        button {
            background: var(--glow-color);
            color: black;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
        }

        #output-console {
            margin-top: 20px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #fff;
            height: 200px;
            overflow-y: auto;
        }

        .status-bar { position: absolute; bottom: 10px; width: 90%; display: flex; justify-content: space-between; font-size: 0.7rem;}
    </style>
</head>
<body>

    <div class="header">
        <div>STARK INDUSTRIES // OS v3.0</div>
        <div id="clock">00:00:00</div>
    </div>

    <div class="container">
        <div class="panel">
            <h2>Daily Missions</h2>
            <div class="input-group">
                <input type="text" id="goalInput" placeholder="Add Mission...">
                <button onclick="addGoal()">+</button>
            </div>
            <ul id="goal-list"></ul>
        </div>

        <div class="panel">
            <h2>System Command Interface</h2>
            <div class="input-group">
                <input type="text" id="commandInput" placeholder="Awaiting orders, Sir...">
                <button onclick="askJarvis()">SEND</button>
            </div>
            <div id="output-console">
                > System Online... <br>
                > All primary systems nominal.
            </div>
        </div>
    </div>

    <div class="status-bar">
        <span>CORE TEMP: 32°C</span>
        <span>LOCATION: MALIBU, CA</span>
        <span>ARC REACTOR: 98%</span>
    </div>

    <script>
        // Update Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);

        // Add Goal Function
        function addGoal() {
            const input = document.getElementById('goalInput');
            if (input.value === "") return;
            
            const li = document.createElement('li');
            li.className = 'goal-item';
            li.innerHTML = `<input type="checkbox"> ${input.value}`;
            document.getElementById('goal-list').appendChild(li);
            input.value = "";
        }

        // Simulate "Asking" Jarvis
        function askJarvis() {
            const input = document.getElementById('commandInput');
            const console = document.getElementById('output-console');
            
            if (input.value === "") return;

            const userMsg = `<br>> <span style="color: #00d4ff;">QUERY: ${input.value}</span>`;
            console.innerHTML += userMsg;

            // Simple Logic for "Ask Anything"
            setTimeout(() => {
                let response = "I've processed your request. Shall I proceed with the protocols?";
                if(input.value.toLowerCase().includes("time")) response = "The current time is " + new Date().toLocaleTimeString();
                if(input.value.toLowerCase().includes("who am i")) response = "You are Tony Stark. Or at least, you're the one in charge today.";

                console.innerHTML += `<br>> JARVIS: ${response}`;
                input.value = "";
                console.scrollTop = console.scrollHeight;
            }, 500);
        }
    </script>
</body>
</html>
